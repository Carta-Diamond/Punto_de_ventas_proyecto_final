<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="contenedor">

        <!-- MENU LATERAL -->
        <aside class="sidebar">
            <h2>PuntoVenta</h2>
            <ul>
                <li><a href="{{ url_for('index') }}">Inicio</a></li>
                <li><a href="{{ url_for('vista_clientes') }}">Clientes</a></li>
                <li><a href="{{ url_for('vista_ordenes') }}">Ordenes</a></li>
                <li><a href="{{ url_for('vista_pagos') }}">Pagos</a></li>
                <li><a href="{{ url_for('vista_productos') }}">Productos</a></li>
                <li><a href="{{ url_for('vista_reportes') }}" class="active">Reportes</a></li>
                <li><a href="{{ url_for('vista_usuarios') }}">Usuarios</a></li>
            </ul>
        </aside>

        <!-- CONTENIDO -->
        <main class="contenido">

            <header class="header">
                <h1>Reportes</h1>
            </header>

            <!-- REPORTE: PRODUCTOS MÁS VENDIDOS -->
            <section class="tabla-section">
                <h2>Productos más vendidos</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>Total vendidos</th>
                            <th>Ingresos</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in mas_vendidos %}
                        <tr>
                            <td>{{ item.nombre }}</td>
                            <td>{{ item.total_vendidos }}</td>
                            <td>${{ item.ingresos }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </section>

        </main>
    </div>

</body>
</html>
